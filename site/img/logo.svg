<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 58" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="100" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80D8FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2979FF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0" y1="14" x2="0" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer frame: angular tech shape -->
  <path d="M4 8 L50 0 L96 8 L100 29 L96 50 L50 58 L4 50 L0 29Z" fill="url(#shieldGrad)" opacity="0.1"/>
  <path d="M4 8 L50 0 L96 8 L100 29 L96 50 L50 58 L4 50 L0 29Z" stroke="url(#shieldGrad)" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Inner glow fill -->
  <path d="M8 10 L50 3 L92 10 L96 29 L92 48 L50 55 L8 48 L4 29Z" fill="url(#glowGrad)"/>

  <!-- Circuit lines (tech accent) -->
  <g stroke="#2196F3" stroke-width="0.5" opacity="0.3" filter="url(#glow)">
    <line x1="6" y1="29" x2="14" y2="29"/>
    <line x1="86" y1="29" x2="94" y2="29"/>
    <circle cx="14" cy="29" r="1.2" fill="#2196F3"/>
    <circle cx="86" cy="29" r="1.2" fill="#2196F3"/>
    <line x1="50" y1="2" x2="50" y2="8"/>
    <line x1="50" y1="50" x2="50" y2="56"/>
    <circle cx="50" cy="8" r="1" fill="#2196F3"/>
    <circle cx="50" cy="50" r="1" fill="#2196F3"/>
    <circle cx="8" cy="11" r="0.8" fill="#2196F3"/>
    <circle cx="92" cy="11" r="0.8" fill="#2196F3"/>
    <circle cx="8" cy="47" r="0.8" fill="#2196F3"/>
    <circle cx="92" cy="47" r="0.8" fill="#2196F3"/>
  </g>

  <!-- Horizontal scan line -->
  <rect x="10" y="28" width="80" height="0.5" fill="#2196F3" opacity="0.06"/>

  <!-- Letter И -->
  <path d="M10 16h6v22l10-22h6v34h-6V28L16 50H10V16z" fill="url(#letterGrad)"/>

  <!-- Letter Т -->
  <path d="M36 16h22v7H50v27h-6V23H36V16z" fill="url(#letterGrad)"/>

  <!-- Letter Ц -->
  <path d="M62 16h6v27h10V16h6v27h4v10h-5V50H62V16z" fill="url(#letterGrad)"/>

  <!-- Text: ИНФОРМАЦИОННО- -->
  <text x="108" y="24" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#1565C0" letter-spacing="0.5">ИНФОРМАЦИОННО-</text>

  <!-- Text: ТЕХНОЛОГИЧЕСКИЙ -->
  <text x="108" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#1565C0" letter-spacing="0.5">ТЕХНОЛОГИЧЕСКИЙ</text>

  <!-- Text: ЦЕНТР -->
  <text x="108" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#1565C0" letter-spacing="0.5">ЦЕНТР</text>
</svg>
